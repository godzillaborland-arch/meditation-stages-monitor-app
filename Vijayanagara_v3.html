document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

it-user-select:none;touch-action:none;overflow:hidden;\">\n\n  \n\n  <canvas ref=\"{{ setCanvasRef }}\" sc-camel-on-pointer-down=\"{{ onPointerDown }}\" sc-camel-on-pointer-move=\"{{ onPointerMove }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair;\"><\u002Fcanvas>\n\n  <!-- TOP HUD -->\n  <sc-if value=\"{{ showHud }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"hud-bar\" style=\"position:absolute;top:0;left:0;right:0;padding:14px 20px;display:flex;align-items:center;gap:22px;background:linear-gradient(180deg, rgba(14,16,19,0.92), rgba(14,16,19,0));pointer-events:none;\">\n      <div class=\"hud-info\" style=\"display:flex;flex-direction:column;gap:4px;min-width:170px;max-width:220px;\">\n        <div style=\"font-size:11px;letter-spacing:0.14em;color:#7a8886;\">{{ stageLabel }}<\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:700;color:#3fe0c8;letter-spacing:0.04em;\">{{ stageName }}<\u002Fdiv>\n        <div style=\"font-size: 10px; line-height: 1.4; color: #A2C3BE; font-weight: 700\">{{ stageContext }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"hud-sanctity\" style=\"flex:1;display:flex;flex-direction:column;gap:6px;max-width:340px;\">\n        <div style=\"display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.12em;color:#8fa19f;\">\n          <span>SANCTITY / CONCENTRATION<\u002Fspan>\n          <span>{{ sanctityInt }}%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:8px;border:1px solid rgba(63,224,200,0.35);background:rgba(255,255,255,0.03);position:relative;\">\n          <div style=\"height:100%;background:{{ sanctityColor }};width:{{ sanctityPct }}%;transition:width 0.25s linear;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasMeter }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"hud-meter2\" style=\"flex:1;display:flex;flex-direction:column;gap:6px;max-width:300px;\">\n          <div style=\"display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.12em;color:#8fa19f;\">\n            <span>{{ meterLabel }}<\u002Fspan>\n            <span>{{ meterInt }}%<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"height:8px;border:1px solid rgba(255,84,112,0.35);background:rgba(255,255,255,0.03);position:relative;\">\n            <div style=\"height:100%;background:#ff5470;width:{{ meterPct }}%;transition:width 0.25s linear;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isDemoMode }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"pointer-events:auto;font-size:10px;letter-spacing:0.12em;color:#3fe0c8;border:1px solid rgba(63,224,200,0.35);padding:6px 10px;white-space:nowrap;\">◉ AUTO-DEMO<\u002Fdiv>\n      <\u002Fsc-if>\n      <div sc-camel-on-click=\"{{ onRestartOrExit }}\" style=\"pointer-events:auto;cursor:pointer;font-size:10px;letter-spacing:0.1em;color:#5c6b69;border:1px solid rgba(255,255,255,0.12);padding:6px 10px;white-space:nowrap;\" style-hover=\"color:#ff5470;border-color:rgba(255,84,112,0.4);\">⟲ {{ restartLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;bottom:14px;left:20px;right:20px;pointer-events:none;\">\n      <div style=\"font-size:11px;letter-spacing:0.06em;color:#3fe0c8;background:rgba(15,20,19,0.55);display:inline-block;padding:6px 12px;border-left:2px solid #3fe0c8;max-width:90%;\">&gt; {{ logText }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- TITLE SCREEN -->\n  <sc-if value=\"{{ isTitle }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;padding:24px;background:radial-gradient(ellipse at center, rgba(63,224,200,0.06), rgba(14,16,19,0.97) 70%);animation:mmk-fadein 0.5s ease;\">\n      <div class=\"title-topright\" style=\"position:absolute;top:20px;right:22px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;\">\n        <div sc-camel-on-click=\"{{ onShowHowTo }}\" style=\"pointer-events: auto; cursor: pointer; padding: 10px 18px; border: 1px solid rgba(255,255,255,0.2); color: #50DDCD; font-size: 12px; letter-spacing: 0.12em; font-weight: 700\" style-hover=\"border-color:#3fe0c8;color:#3fe0c8;\">? HOW TO PLAY<\u002Fdiv>\n        <a href=\"https://selfdrivingmind.substack.com/p/they-stole-the-god-first-then-came?r=6gle0t\" target=\"_blank\" rel=\"noopener\" style=\"pointer-events: auto; cursor: pointer; color: #28D31C; font-size: 15px; letter-spacing: 0.12em; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 2px; text-align: left\" style-hover=\"color:#3fe0c8;border-color:#3fe0c8;\">↗ READ SOURCE<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;letter-spacing:0.3em;color:#ff5470;\">A GAME OF CIVILIZATIONAL MEMORY<\u002Fdiv>\n      <div style=\"font-size:clamp(28px,5vw,54px);font-weight:800;color:#3fe0c8;letter-spacing:0.02em;text-shadow:0 0 30px rgba(63,224,200,0.35);\">VIJAYANAGARA<\u002Fdiv>\n      <div style=\"font-size:16px;letter-spacing:0.18em;color:#dfe6e5;margin-top:-14px;\">RETURN OF THE GOD<\u002Fdiv>\n      <div style=\"max-width:580px;font-size:13px;line-height:1.7;color:#94a3a0;margin-top:6px;\">1323 CE. The Sultanate sacks Srirangam. Priests spirit the deity Sri Ranganatha out of his sanctum to survive an empire's erasure — through secret exile, forced captivity in Delhi, a sage's realignment on the Tungabhadra, and a liberating march back home. Five stages, one continuous thread of memory that refuses to break.<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;\">\n        <div sc-camel-on-click=\"{{ onBegin }}\" style=\"pointer-events:auto;cursor:pointer;margin-top:14px;padding:16px 44px;border:1px solid #3fe0c8;color:#3fe0c8;font-size:14px;letter-spacing:0.18em;font-weight:700;animation:mmk-pulseglow 2.4s ease infinite;\" style-hover=\"background:rgba(63,224,200,0.12);\">BEGIN TRANSMISSION<\u002Fdiv>\n        <div sc-camel-on-click=\"{{ onWatchDemo }}\" style=\"pointer-events:auto;cursor:pointer;padding:12px 24px;border:1px solid rgba(255,255,255,0.2);color:#8fa19f;font-size:12px;letter-spacing:0.14em;font-weight:700;\" style-hover=\"border-color:#3fe0c8;color:#3fe0c8;\">▶ WATCH AUTO-DEMO<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- HOW TO PLAY -->\n  <sc-if value=\"{{ isHowTo }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"howto-box\" style=\"position:absolute;inset:0;overflow-y:auto;background:rgba(14,16,19,0.98);animation:mmk-fadein 0.4s ease;padding:40px 24px;\">\n      <div style=\"max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:26px;\">\n        <div style=\"text-align:center;display:flex;flex-direction:column;gap:8px;\">\n          <div style=\"font-size:11px;letter-spacing:0.3em;color:#ff5470;\">HOW TO PLAY<\u002Fdiv>\n          <div style=\"font-size:clamp(20px,3vw,30px);font-weight:800;color:#3fe0c8;\">FIVE STAGES, ONE THREAD<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#8fa19f;line-height:1.6;\">Move your mouse or finger to aim; click/tap to act. Sanctity/Concentration is your shared life force — it carries across every stage. Each stage recreates one leg of the deity's fifty-year journey from Srirangam into exile and back, from the secret evacuation of 1323 to the reinstallation of 1371–1372.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{ howToStages }}\" as=\"s\" hint-placeholder-count=\"5\">\n          <div style=\"border:1px solid rgba(255,255,255,0.1);padding:18px 20px;display:flex;flex-direction:column;gap:10px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;\">\n              <div style=\"font-size:14px;font-weight:700;color:#3fe0c8;letter-spacing:0.04em;\">STAGE {{ s.num }} — {{ s.name }}<\u002Fdiv>\n              <div style=\"font-size:10px;color:#7a8886;letter-spacing:0.1em;\">{{ s.place }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ s.steps }}\" as=\"step\" hint-placeholder-count=\"3\">\n              <div style=\"font-size:12.5px;line-height:1.7;color:#c4cecc;display:flex;gap:10px;\">\n                <span style=\"color:#ff5470;\">▸<\u002Fspan><span>{{ step }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"text-align:center;\">\n          <div sc-camel-on-click=\"{{ onBackFromHowTo }}\" style=\"display:inline-block;pointer-events:auto;cursor:pointer;padding:13px 30px;border:1px solid #3fe0c8;color:#3fe0c8;font-size:13px;letter-spacing:0.16em;font-weight:700;\" style-hover=\"background:rgba(63,224,200,0.12);\">BACK<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- INTERLUDE -->\n  <sc-if value=\"{{ isInterlude }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:24px;background:rgba(14,16,19,0.94);animation:mmk-fadein 0.5s ease;\">\n      <div style=\"font-size:10px;letter-spacing:0.3em;color:#7a8886;\">STAGE {{ stage }} / 5<\u002Fdiv>\n      <div style=\"font-size:clamp(20px,3.2vw,32px);font-weight:800;color:#3fe0c8;letter-spacing:0.03em;\">{{ interludeTitle }}<\u002Fdiv>\n      <div style=\"font-size:12px;letter-spacing:0.1em;color:#ff5470;\">{{ interludePlace }}<\u002Fdiv>\n      <div style=\"max-width:560px;font-size:13.5px;line-height:1.8;color:#c4cecc;margin-top:4px;white-space:pre-line;\">{{ interludeBody }}<\u002Fdiv>\n      <div sc-camel-on-click=\"{{ onContinue }}\" style=\"pointer-events:auto;cursor:pointer;margin-top:14px;padding:13px 30px;border:1px solid #3fe0c8;color:#3fe0c8;font-size:13px;letter-spacing:0.16em;font-weight:700;\" style-hover=\"background:rgba(63,224,200,0.12);\">{{ interludeBtnLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- STAGE 2: OS RESET QTE -->\n  <sc-if value=\"{{ isStage2 }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:24px;pointer-events:none;\">\n      <div style=\"font-size:11px;letter-spacing:0.2em;color:#ff5470;\">EXTERNAL COMMAND — DELHI SULTANATE ROOT ACCESS<\u002Fdiv>\n      <div style=\"font-size:10px;letter-spacing:0.08em;color:#7a8886;\">A command flashes below. Press the matching key (1/2/3) — but wait a beat first. Too fast reads as panic; too slow reads as refusal.<\u002Fdiv>\n      <div style=\"font-size:clamp(22px,4vw,40px);font-weight:800;color:#ff5470;letter-spacing:0.06em;text-shadow:0 0 24px rgba(255,84,112,0.45);\">{{ stage2Prompt }}<\u002Fdiv>\n      <div class=\"stage2-row\" style=\"display:flex;gap:16px;pointer-events:auto;\">\n        <sc-for list=\"{{ stage2Options }}\" as=\"opt\" hint-placeholder-count=\"3\">\n          <div class=\"stage2-opt\" sc-camel-on-click=\"{{ opt.onPress }}\" style=\"cursor:pointer;padding:16px 20px;border:1px solid {{ opt.borderColor }};color:{{ opt.textColor }};font-size:12px;letter-spacing:0.08em;text-align:center;min-width:150px;background:{{ opt.bg }};\" style-hover=\"background:rgba(63,224,200,0.1);\">\n            <div style=\"font-size:18px;font-weight:800;margin-bottom:6px;\">{{ opt.key }}<\u002Fdiv>\n            <div>{{ opt.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px;width:320px;max-width:80vw;\">\n        <div style=\"display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.1em;color:#8fa19f;\"><span>IDENTITY CORE<\u002Fspan><span>{{ meterInt }}%<\u002Fspan><\u002Fdiv>\n        <div style=\"height:10px;border:1px solid rgba(63,224,200,0.35);background:rgba(255,255,255,0.03);\"><div style=\"height:100%;background:#3fe0c8;width:{{ meterPct }}%;transition:width 0.15s linear;\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:10px;letter-spacing:0.1em;color:#5c6b69;text-align:center;margin-top:6px;\">SURVIVE {{ stage2TimeLeft }}s — pace your responses. Mashing destabilizes the core.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- GAME OVER -->\n  <sc-if value=\"{{ isGameOver }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:24px;background:rgba(20,8,10,0.95);animation:mmk-fadein 0.5s ease;\">\n      <div style=\"font-size:11px;letter-spacing:0.3em;color:#ff5470;\">TRANSMISSION INTERRUPTED<\u002Fdiv>\n      <div style=\"max-width:540px;font-size:15px;line-height:1.9;color:#e8bcc2;\">Identity overwritten. The thread that carried the deity from Srirangam toward home snaps here — sanctity spent, concentration broken. But the center was lost only for this attempt; it is always there, waiting to be re-aligned.<\u002Fdiv>\n      <div sc-camel-on-click=\"{{ onRestart }}\" style=\"pointer-events:auto;cursor:pointer;margin-top:10px;padding:13px 30px;border:1px solid #ff5470;color:#ff5470;font-size:13px;letter-spacing:0.16em;font-weight:700;\" style-hover=\"background:rgba(255,84,112,0.12);\">RETURN TO CENTER<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- VICTORY -->\n  <sc-if value=\"{{ isVictory }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:24px;background:radial-gradient(ellipse at center, rgba(63,224,200,0.1), rgba(14,16,19,0.97) 70%);animation:mmk-fadein 0.6s ease;\">\n      <div style=\"font-size:11px;letter-spacing:0.3em;color:#3fe0c8;\">1371–1372 CE — REINSTALLATION COMPLETE<\u002Fdiv>\n      <div style=\"font-size:clamp(20px,3.4vw,34px);font-weight:800;color:#3fe0c8;\">RESTORATION OF SRI RANGAM DEITY<\u002Fdiv>\n      <div style=\"max-width:580px;font-size:14px;line-height:1.9;color:#c4cecc;\">Nearly fifty years after the secret exile of 1323, Sri Ranganatha is carried back through the temple gates at Srirangam and reinstalled in his sanctum. Dharmic continuity is restored where it had been broken — carried, across three generations, from the deity's rescue through captivity, Sage Vidyaranya's realignment on the Tungabhadra, and General Gopana's liberating campaign. The charge outlasts the transmitter.<\u002Fdiv>\n      <div sc-camel-on-click=\"{{ onRestart }}\" style=\"pointer-events:auto;cursor:pointer;margin-top:10px;padding:13px 30px;border:1px solid #3fe0c8;color:#3fe0c8;font-size:13px;letter-spacing:0.16em;font-weight:700;\" style-hover=\"background:rgba(63,224,200,0.12);\">PLAY AGAIN<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 960, &quot;height&quot;: 600}}\">\nconst STAGES = [\n  { name: 'THE SECRET EXILE', place: 'Srirangam, 1323 CE',\n    intro: 'The Sultanate\\'s riders breach the temple walls. Priests lift Namperumal — the processional form of Sri Ranganatha — from his sanctum and run. Raiders are already closing in from every side. Aim your arc, fire your pulses, keep him moving.',\n    outro: 'The god crosses into shadow, unseen. The first exile begins — a journey that will carry him through three kingdoms before he sees Srirangam again.' },\n  { name: 'THE OPERATING SYSTEM RESET', place: 'Delhi, 1327–1335 CE',\n    intro: 'Captivity is not only a cell. It is a system demanding compliance — new names, new masters, a new self flashed at you until the old one forgets its shape. In the Sultanate\\'s court, the deity is kept as a captive icon, an ornament of conquest paraded to prove submission. Hold the core steady. Do not rush obedience; do not resist so hard it snaps.',\n    outro: 'Years pass under the yoke of forced names. But somewhere south, past the Tungabhadra, a signal survives — and two brothers, Harihara and Bukka, are already laying the foundations of a kingdom built to answer it.' },\n  { name: 'THE GRANITE RIDGE TRANSMISSION', place: 'Tungabhadra Bank, 1336 CE',\n    intro: 'On a river ridge, the sage Vidyaranya — Sringeri\\'s presiding pontiff and the guiding mind behind the new capital — watches a compass turn with no hand on it. He does not fight the world. He aligns to it, and lets that alignment become the model others will endow for centuries: temples, tanks, and agraharas granted not by conquest but by consecrated intent.',\n    outro: 'The Endowment Model takes root. Vijayanagara rises on the strength of it, and the center no longer depends on any one protector — it depends on a pattern that outlives them all.' },\n  { name: 'THE SOUTHERN CAMPAIGN', place: 'The Liberation Route, 1371 CE',\n    intro: 'Decades on, General Gopana — a vassal commander of the Vijayanagara throne — rides north with the reclaimed image behind him, fulfilling a vow made at Srirangam\\'s ruined gates. Between here and home: garrisons of occupation dug into the road, remnants of the same power that once carried the deity into exile. The march does not stop for them. It clears through.',\n    outro: 'The road opens, wave after wave. Srirangam\\'s walls rise on the horizon, empty of their god for nearly fifty years.' },\n  { name: 'THE TRIUMPHANT RETURN', place: 'Reinstallation, 1371–1372 CE',\n    intro: 'The gates are set back on their hinges. What returns now is not only a bronze image — it is a continuity that refused to end across three generations of custodians. Hold the perimeter until the restoration compounds beyond any single defender, until the temple is, once more, simply home.',\n    outro: '' }\n];\n\nconst clamp = (v,a,b)=>Math.max(a,Math.min(b,v));\nconst rand = (a,b)=>a+Math.random()*(b-a);\nconst TAU = Math.PI*2;\nfunction angDiff(a,b){ let d=(a-b)%TAU; if(d>Math.PI) d-=TAU; if(d<-Math.PI) d+=TAU; return d; }\n\nclass Component extends DCLogic {\n  state = {\n    phase: 'title', stage: 1,\n    sanctity: 100, meter: 0,\n    logText: 'Standing by...',\n    stage2Prompt: '', stage2TimeLeft: 45, identityCore: 100,\n  };\n\n  particles = []; pulses = []; mouse = { x: 0, y: 0 };\n  W = 800; H = 600;\n\n  componentDidMount() {\n    this._onResize = () => this.resize();\n    window.addEventListener('resize', this._onResize);\n    this._onKey = (e) => this.onKeyDown(e);\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n    if (this.raf) cancelAnimationFrame(this.raf);\n  }\n\n  setCanvasRef(el) {\n    if (!el || this.canvas === el) return;\n    this.canvas = el;\n    this.ctx = el.getContext('2d');\n    this.resize();\n    if (!this.raf) { this.lastTs = performance.now(); this.loop(this.lastTs); }\n  }\n\n  resize() {\n    if (!this.canvas) return;\n    const r = this.canvas.getBoundingClientRect();\n    this.W = Math.max(320, r.width); this.H = Math.max(320, r.height);\n    this.canvas.width = this.W; this.canvas.height = this.H;\n  }\n\n  log(msg) { this.setState({ logText: msg }); }\n\n  // ---------- audio (synthesized, no assets) ----------\n  ensureAudio() {\n    if (!this.audioCtx) {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (!AC) return;\n      this.audioCtx = new AC();\n    }\n    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();\n  }\n  tone(freq, dur, type, gainVal, delay) {\n    if (!this.audioCtx) return;\n    const t0 = this.audioCtx.currentTime + (delay||0);\n    const osc = this.audioCtx.createOscillator();\n    const gain = this.audioCtx.createGain();\n    osc.type = type || 'sine'; osc.frequency.setValueAtTime(freq, t0);\n    gain.gain.setValueAtTime(0.0001, t0);\n    gain.gain.exponentialRampToValueAtTime(gainVal||0.14, t0+0.01);\n    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);\n    osc.connect(gain); gain.connect(this.audioCtx.destination);\n    osc.start(t0); osc.stop(t0+dur+0.02);\n  }\n  sfxPulse() { this.tone(180,0.28,'sine',0.12); this.tone(360,0.18,'sine',0.06,0.02); }\n  sfxHit() { this.tone(720,0.09,'triangle',0.1); }\n  sfxDamage() { this.tone(140,0.32,'sawtooth',0.14); }\n  sfxClear() { this.tone(392,0.16,'sine',0.12); this.tone(523,0.16,'sine',0.12,0.14); this.tone(659,0.28,'sine',0.12,0.28); }\n  sfxVictory() { [392,494,587,784,988].forEach((f,i)=>this.tone(f,0.4,'sine',0.11,i*0.14)); }\n  sfxGameOver() { this.tone(220,0.5,'sawtooth',0.12); this.tone(110,0.9,'sawtooth',0.14,0.15); }\n  sfxCorrect() { this.tone(520,0.08,'sine',0.09); }\n  sfxWrong() { this.tone(160,0.2,'square',0.1); }\n\n  // ---------- lifecycle / phase control ----------\n  onBegin() { this.ensureAudio(); this.enterInterlude(1); }\n  onShowHowTo() { this.setState({ phase: 'howto' }); }\n  onBackFromHowTo() { this.setState({ phase: 'title' }); }\n\n  onWatchDemo() {\n    this.ensureAudio();\n    this.demoMode = true;\n    this.setState({ demoMode: true });\n    this.enterInterlude(1);\n  }\n  onExitDemo() {\n    clearTimeout(this.demoTimeout);\n    this.demoMode = false;\n    this.onRestart();\n  }\n\n  enterInterlude(stageNum) {\n    this.setState({ phase: 'interlude', stage: stageNum });\n    this.scheduleAutoAdvance();\n  }\n\n  scheduleAutoAdvance() {\n    clearTimeout(this.demoTimeout);\n    if (!this.demoMode) return;\n    this.demoTimeout = setTimeout(() => {\n      if (this.state.phase === 'interlude') this.onContinue();\n    }, 1700);\n  }\n\n  onContinue() {\n    clearTimeout(this.demoTimeout);\n    const stage = this.state.stage;\n    if (stage === 2) { this.setupStage2(); this.setState({ phase: 'stage2' }); }\n    else { this.setupStage(stage); this.setState({ phase: 'playing' }); }\n  }\n\n  stageClear(stageNum) {\n    if (stageNum >= 5) { this.sfxVictory(); this.setState({ phase: 'victory' }); return; }\n    this.sfxClear();\n    this.setState({ phase: 'interlude', stage: stageNum + 1, meter: 0 });\n    this.scheduleAutoAdvance();\n  }\n\n  onRestart() {\n    clearTimeout(this.demoTimeout);\n    this.particles = []; this.pulses = [];\n    this.setState({ phase: 'title', stage: 1, sanctity: 100, meter: 0, logText: 'Standing by...', identityCore: 100, demoMode: false });\n  }\n\n  triggerGameOver() { this.sfxGameOver(); this.setState({ phase: 'gameover' }); }\n\n  damage(amount) {\n    this.sfxDamage();\n    const s = clamp(this.state.sanctity - amount, 0, 100);\n    this.setState({ sanctity: s });\n    if (s <= 0) this.triggerGameOver();\n  }\n\n  // ---------- input ----------\n  onPointerMove(e) {\n    const r = this.canvas.getBoundingClientRect();\n    this.mouse.x = e.clientX - r.left; this.mouse.y = e.clientY - r.top;\n  }\n  onPointerDown(e) {\n    this.ensureAudio();\n    this.onPointerMove(e);\n    if (this.state.phase !== 'playing') return;\n    this.firePulse();\n    this.sfxPulse();\n  }\n  onKeyDown(e) {\n    if (this.state.phase === 'stage2') {\n      if (e.key === '1' || e.key === '2' || e.key === '3') this.stage2Press(e.key);\n    }\n  }\n\n  spawnParticles(x, y, color, count) {\n    for (let i = 0; i < count; i++) {\n      const a = rand(0, TAU), sp = rand(40, 220);\n      this.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: rand(0.35, 0.7), maxLife: 0.7, color });\n    }\n  }\n  updateParticles(dt) {\n    for (let i = this.particles.length - 1; i >= 0; i--) {\n      const p = this.particles[i];\n      p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= 0.94; p.vy *= 0.94;\n      if (p.life <= 0) this.particles.splice(i, 1);\n    }\n  }\n  drawParticles(ctx) {\n    for (const p of this.particles) {\n      const a = clamp(p.life / p.maxLife, 0, 1);\n      ctx.globalAlpha = a; ctx.fillStyle = p.color;\n      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, TAU); ctx.fill();\n    }\n    ctx.globalAlpha = 1;\n  }\n\n  drawGrid(ctx) {\n    ctx.fillStyle = '#0e1013'; ctx.fillRect(0, 0, this.W, this.H);\n    ctx.strokeStyle = 'rgba(255,255,255,0.035)'; ctx.lineWidth = 1;\n    const step = 44;\n    for (let x = 0; x < this.W; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,this.H); ctx.stroke(); }\n    for (let y = 0; y < this.H; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(this.W,y); ctx.stroke(); }\n  }\n\n  // ---------- generic pulses ----------\n  updatePulses(dt, hitFn) {\n    for (let i = this.pulses.length - 1; i >= 0; i--) {\n      const p = this.pulses[i];\n      p.r += p.speed * dt;\n      hitFn(p);\n      if (p.r > p.maxR) this.pulses.splice(i, 1);\n    }\n  }\n  drawPulses(ctx) {\n    for (const p of this.pulses) {\n      const a = clamp(1 - p.r / p.maxR, 0, 1);\n      ctx.strokeStyle = `rgba(63,224,200,${0.7*a})`; ctx.lineWidth = 3;\n      if (p.cone == null) {\n        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.stroke();\n      } else {\n        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, p.angle - p.cone, p.angle + p.cone); ctx.stroke();\n      }\n    }\n  }\n  firePulse() {\n    if (this.stage === 1) this.pulses.push({ x: this.payload.x, y: this.payload.y, r: 0, maxR: 240, speed: 460, hits: new Set() });\n    else if (this.stage === 4) this.pulses.push({ x: this.vanguard.x, y: this.vanguard.y, r: 0, maxR: 260, speed: 500, hits: new Set() });\n    else if (this.stage === 5) {\n      const cx = this.W/2, cy = this.H/2;\n      const angle = Math.atan2(this.mouse.y - cy, this.mouse.x - cx);\n      this.pulses.push({ x: cx, y: cy, r: 0, maxR: Math.max(this.W,this.H), speed: 620, angle, cone: 0.4, hits: new Set() });\n    }\n  }\n\n  // ---------- stage setup dispatch ----------\n  setupStage(n) {\n    this.stage = n;\n    this.pulses = []; this.particles = [];\n    if (n === 1) this.setupStage1();\n    if (n === 3) this.setupStage3();\n    if (n === 4) this.setupStage4();\n    if (n === 5) this.setupStage5();\n  }\n\n  // ===== STAGE 1: ESCORT =====\n  setupStage1() {\n    this.payload = { t: 0, x: 0, y: this.H/2 };\n    this.raiders = [];\n    this.stage1Duration = 16;\n    this.spawnTimer = 0.2;\n    this.log('Escort the payload across the ground — raiders incoming fast.');\n  }\n  updateStage1(dt) {\n    this.payload.t = clamp(this.payload.t + dt/this.stage1Duration, 0, 1);\n    this.payload.x = this.payload.t * this.W;\n    this.payload.y = this.H/2 + Math.sin(this.payload.t*Math.PI*4) * this.H*0.16;\n\n    this.protectorAngle = Math.atan2(this.mouse.y - this.payload.y, this.mouse.x - this.payload.x);\n\n    this.spawnTimer -= dt;\n    if (this.spawnTimer <= 0) {\n      this.spawnTimer = rand(0.35, 0.6);\n      const burst = Math.random() < 0.3 ? 2 : 1;\n      for (let k=0;k<burst;k++) {\n        const edge = Math.floor(rand(0,4));\n        let x,y;\n        if (edge===0){x=rand(0,this.W);y=-20;} else if(edge===1){x=this.W+20;y=rand(0,this.H);}\n        else if (edge===2){x=rand(0,this.W);y=this.H+20;} else {x=-20;y=rand(0,this.H);}\n        const a = Math.atan2(this.payload.y-y, this.payload.x-x);\n        const sp = rand(150,190);\n        this.raiders.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, a });\n      }\n    }\n    for (let i = this.raiders.length-1; i>=0; i--) {\n      const r = this.raiders[i];\n      const homeAngle = Math.atan2(this.payload.y-r.y, this.payload.x-r.x);\n      const sp = Math.hypot(r.vx,r.vy);\n      r.vx = Math.cos(homeAngle)*sp; r.vy = Math.sin(homeAngle)*sp;\n      r.a = homeAngle;\n      r.x += r.vx*dt; r.y += r.vy*dt;\n      const dx = r.x-this.payload.x, dy = r.y-this.payload.y;\n      const dist = Math.hypot(dx,dy);\n      if (dist < 26) {\n        const approachAngle = Math.atan2(dy,dx);\n        const inArc = Math.abs(angDiff(approachAngle, this.protectorAngle)) < 0.95;\n        if (inArc) { this.spawnParticles(r.x,r.y,'#3fe0c8',14); this.sfxHit(); }\n        else { this.spawnParticles(r.x,r.y,'#ff5470',14); this.damage(7); }\n        this.raiders.splice(i,1); continue;\n      }\n      for (const p of this.pulses) {\n        if (p.hits.has(r)) continue;\n        const pd = Math.hypot(r.x-p.x, r.y-p.y);\n        if (Math.abs(pd - p.r) < 16) { p.hits.add(r); this.spawnParticles(r.x,r.y,'#3fe0c8',16); this.sfxHit(); this.raiders.splice(i,1); break; }\n      }\n    }\n    this.updatePulses(dt, ()=>{});\n    if (this.payload.t >= 1) this.stageClear(1);\n  }\n  drawStage1(ctx) {\n    ctx.strokeStyle = 'rgba(63,224,200,0.28)'; ctx.setLineDash([6,8]); ctx.lineWidth=2;\n    ctx.beginPath();\n    for (let x=0;x<=this.W;x+=8) ctx.lineTo(x, this.H/2 + Math.sin((x/this.W)*Math.PI*4)*this.H*0.16);\n    ctx.stroke(); ctx.setLineDash([]);\n\n    ctx.fillStyle = '#caa15a'; ctx.beginPath(); ctx.arc(this.payload.x,this.payload.y,15,0,TAU); ctx.fill();\n    ctx.strokeStyle = 'rgba(202,161,90,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(this.payload.x,this.payload.y,22,0,TAU); ctx.stroke();\n\n    ctx.fillStyle = 'rgba(63,224,200,0.22)';\n    ctx.beginPath();\n    ctx.moveTo(this.payload.x, this.payload.y);\n    ctx.arc(this.payload.x,this.payload.y,55,this.protectorAngle-0.87,this.protectorAngle+0.87);\n    ctx.closePath(); ctx.fill();\n    ctx.strokeStyle = '#3fe0c8'; ctx.lineWidth=2;\n    ctx.beginPath(); ctx.arc(this.payload.x,this.payload.y,55,this.protectorAngle-0.87,this.protectorAngle+0.87); ctx.stroke();\n\n    ctx.fillStyle = '#ff5470';\n    for (const r of this.raiders) {\n      ctx.save(); ctx.translate(r.x,r.y); ctx.rotate(r.a+Math.PI/2);\n      ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(8,9); ctx.lineTo(-8,9); ctx.closePath(); ctx.fill();\n      ctx.restore();\n    }\n  }\n\n  // ===== STAGE 2: QTE (state-driven, no canvas mechanics) =====\n  setupStage2() {\n    this.stage = 2; this.stage2Elapsed = 0; this.lastPromptTime = performance.now();\n    this.mashCount = 0;\n    this.setState({ identityCore: 100, stage2TimeLeft: 45 });\n    this.nextStage2Prompt();\n    this.log('Compliance demanded. Pace yourself.');\n  }\n  nextStage2Prompt() {\n    const opts = [['1','IDENTITY OVERWRITE'],['2','NEW NAME'],['3','PROXY COMMAND']];\n    const pick = opts[Math.floor(rand(0,3))];\n    this.stage2Key = pick[0];\n    this.stage2Deadline = 1.9;\n    this.stage2BotDelay = rand(0.5, 0.95);\n    this.lastPromptTime = performance.now();\n    this.setState({ stage2Prompt: pick[1] });\n  }\n  stage2Press(key) {\n    if (this.state.phase !== 'stage2') return;\n    this.ensureAudio();\n    const now = performance.now();\n    const interval = (now - this.lastPromptTime) / 1000;\n    let core = this.state.identityCore;\n    if (key !== this.stage2Key) { core = clamp(core-6,0,100); this.log('Invalid response — recalibrating.'); this.sfxWrong(); }\n    else if (interval < 0.28) { core = clamp(core-15,0,100); this.log('TOO FAST — destabilizing.'); this.sfxWrong(); }\n    else { core = clamp(core+4,0,100); this.log('Compliance registered. Thread holds.'); this.sfxCorrect(); }\n    this.setState({ identityCore: core });\n    if (core <= 0) { this.triggerGameOver(); return; }\n    this.nextStage2Prompt();\n  }\n  updateStage2(dt) {\n    if (this.demoMode) {\n      this.stage2BotDelay -= dt;\n      if (this.stage2BotDelay <= 0) { this.stage2Press(this.stage2Key); return; }\n    }\n    this.stage2Elapsed += dt;\n    this.stage2Deadline -= dt;\n    if (this.stage2Deadline <= 0) {\n      const core = clamp(this.state.identityCore - 10, 0, 100);\n      this.setState({ identityCore: core });\n      if (core <= 0) { this.triggerGameOver(); return; }\n      this.nextStage2Prompt();\n    }\n    const left = Math.max(0, 45 - this.stage2Elapsed);\n    this.setState({ stage2TimeLeft: Math.ceil(left) });\n    if (this.stage2Elapsed >= 45) { this.log('Sringeri Intervention signal detected.'); this.stageClear(2); }\n  }\n\n  // ===== STAGE 3: ALIGNMENT =====\n  setupStage3() {\n    this.targetAngle = 0; this.turnSpeed = rand(-1,1); this.turnTimer = 2;\n    this.playerAngle = 0; this.alignAccum = 0;\n    this.obstacles = Array.from({length:4}, () => ({ x: rand(0,this.W), y: rand(0,this.H), vx: rand(-30,30), vy: rand(-20,20), r: rand(26,44) }));\n    this.log('Match the ring. Hold the alignment.');\n  }\n  updateStage3(dt) {\n    this.turnTimer -= dt;\n    if (this.turnTimer <= 0) { this.turnTimer = rand(1.4,2.6); this.turnSpeed = rand(-1.3,1.3); }\n    this.targetAngle += this.turnSpeed*dt;\n    const cx=this.W/2, cy=this.H/2;\n    this.playerAngle = Math.atan2(this.mouse.y-cy, this.mouse.x-cx);\n    const diff = Math.abs(angDiff(this.playerAngle, this.targetAngle));\n    if (diff < 0.28) this.alignAccum = Math.min(20, this.alignAccum + dt);\n    else this.alignAccum = Math.max(0, this.alignAccum - dt*0.5);\n    for (const o of this.obstacles) {\n      o.x += o.vx*dt; o.y += o.vy*dt;\n      if (o.x<-50||o.x>this.W+50) o.vx*=-1;\n      if (o.y<-50||o.y>this.H+50) o.vy*=-1;\n    }\n    this.setState({ meter: (this.alignAccum/20)*100 });\n    if (this.alignAccum >= 20) this.stageClear(3);\n  }\n  drawStage3(ctx) {\n    const cx=this.W/2, cy=this.H/2;\n    const ringR = 90 + Math.sin(performance.now()/500)*30;\n    ctx.fillStyle = 'rgba(63,224,200,0.5)'; ctx.beginPath(); ctx.arc(cx,cy,12,0,TAU); ctx.fill();\n    ctx.strokeStyle = 'rgba(63,224,200,0.18)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,ringR,0,TAU); ctx.stroke();\n\n    ctx.strokeStyle = '#3fe0c8'; ctx.lineWidth=6; ctx.lineCap='round';\n    ctx.beginPath(); ctx.arc(cx,cy,ringR,this.targetAngle-0.18,this.targetAngle+0.18); ctx.stroke();\n\n    const aligned = Math.abs(angDiff(this.playerAngle,this.targetAngle)) < 0.28;\n    ctx.strokeStyle = aligned ? '#3fe0c8' : '#ff5470'; ctx.lineWidth=3;\n    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(this.playerAngle)*140, cy+Math.sin(this.playerAngle)*140); ctx.stroke();\n\n    ctx.fillStyle = 'rgba(120,60,70,0.35)';\n    for (const o of this.obstacles) { ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,TAU); ctx.fill(); }\n  }\n\n  // ===== STAGE 4: SWEEP =====\n  setupStage4() {\n    this.vanguard = { x: this.W/2, y: this.H*0.78 };\n    this.payload4x = this.W/2;\n    this.blockers = [];\n    this.wave = 0; this.spawnWave(0);\n    this.log('Clear the road. Three waves stand between you and home.');\n  }\n  spawnWave(idx) {\n    const rows = 2 + idx;\n    for (let r=0;r<rows;r++) {\n      const cols = Math.floor(rand(3,5));\n      for (let c=0;c<cols;c++) {\n        this.blockers.push({ x: (c+0.5)*(this.W/cols) + rand(-14,14), y: -120 - r*90 - idx*260, w: this.W/cols*0.7, h: 46 });\n      }\n    }\n  }\n  updateStage4(dt) {\n    this.vanguard.x += (this.mouse.x - this.vanguard.x)*Math.min(1, dt*6);\n    this.vanguard.x = clamp(this.vanguard.x, 40, this.W-40);\n    this.payload4x += (this.vanguard.x - this.payload4x)*Math.min(1, dt*2.4);\n\n    const speed = 70;\n    for (let i=this.blockers.length-1;i>=0;i--) {\n      const b = this.blockers[i];\n      b.y += speed*dt;\n      if (b.y > this.vanguard.y + 20) { this.blockers.splice(i,1); this.damage(5); continue; }\n      for (const p of this.pulses) {\n        if (p.hits.has(b)) continue;\n        const dist = Math.hypot(b.x-p.x, b.y-p.y);\n        if (Math.abs(dist - p.r) < 20) { p.hits.add(b); this.spawnParticles(b.x,b.y,'#ff5470',18); this.sfxHit(); this.blockers.splice(i,1); break; }\n      }\n    }\n    this.updatePulses(dt, ()=>{});\n    if (this.blockers.length === 0) {\n      this.wave++;\n      this.setState({ meter: (this.wave/3)*100 });\n      if (this.wave >= 3) { this.stageClear(4); return; }\n      this.spawnWave(this.wave);\n      this.log(`Wave ${this.wave} cleared.`);\n    }\n  }\n  drawStage4(ctx) {\n    ctx.strokeStyle = 'rgba(63,224,200,0.06)'; ctx.lineWidth=2;\n    for (let x=this.W*0.15;x<this.W;x+=this.W*0.35) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,this.H); ctx.stroke(); }\n\n    ctx.fillStyle = '#caa15a'; ctx.beginPath(); ctx.arc(this.payload4x, this.vanguard.y+70, 13, 0, TAU); ctx.fill();\n\n    ctx.fillStyle = '#3fe0c8';\n    ctx.beginPath(); ctx.moveTo(this.vanguard.x, this.vanguard.y-18); ctx.lineTo(this.vanguard.x+16, this.vanguard.y+14); ctx.lineTo(this.vanguard.x-16, this.vanguard.y+14); ctx.closePath(); ctx.fill();\n\n    ctx.fillStyle = 'rgba(255,84,112,0.75)'; ctx.strokeStyle='rgba(255,84,112,0.9)'; ctx.lineWidth=2;\n    for (const b of this.blockers) { ctx.fillRect(b.x-b.w/2, b.y-b.h/2, b.w, b.h); ctx.strokeRect(b.x-b.w/2, b.y-b.h/2, b.w, b.h); }\n  }\n\n  // ===== STAGE 5: BASE DEFENSE =====\n  setupStage5() {\n    this.invaders = []; this.spawnTimer5 = 0; this.compounding = 0;\n    this.setState({ meter: 0 });\n    this.log('Hold the gate. Let the restoration compound.');\n  }\n  updateStage5(dt) {\n    this.spawnTimer5 -= dt;\n    const cx=this.W/2, cy=this.H/2;\n    if (this.spawnTimer5 <= 0) {\n      this.spawnTimer5 = rand(0.35,0.7);\n      const a = rand(0,TAU); const rad = Math.max(this.W,this.H)*0.62;\n      this.invaders.push({ x: cx+Math.cos(a)*rad, y: cy+Math.sin(a)*rad, a });\n    }\n    for (let i=this.invaders.length-1;i>=0;i--) {\n      const inv = this.invaders[i];\n      const dx = cx-inv.x, dy = cy-inv.y; const d = Math.hypot(dx,dy);\n      const dir = Math.atan2(dy,dx);\n      inv.x += Math.cos(dir)*90*dt; inv.y += Math.sin(dir)*90*dt;\n      if (d < 44) { this.spawnParticles(inv.x,inv.y,'#ff5470',16); this.invaders.splice(i,1); this.damage(6); continue; }\n      for (const p of this.pulses) {\n        if (p.hits.has(inv)) continue;\n        const pd = Math.hypot(inv.x-p.x, inv.y-p.y);\n        const angOk = p.cone==null || Math.abs(angDiff(Math.atan2(inv.y-p.y,inv.x-p.x), p.angle)) < p.cone;\n        if (angOk && Math.abs(pd-p.r) < 22) { p.hits.add(inv); this.spawnParticles(inv.x,inv.y,'#3fe0c8',16); this.sfxHit(); this.invaders.splice(i,1); break; }\n      }\n    }\n    this.updatePulses(dt, ()=>{});\n    this.compounding = Math.min(100, this.compounding + dt*(100/55));\n    this.setState({ meter: this.compounding });\n    if (this.compounding >= 100) this.stageClear(5);\n  }\n  drawStage5(ctx) {\n    const cx=this.W/2, cy=this.H/2;\n    ctx.strokeStyle = 'rgba(63,224,200,0.3)'; ctx.setLineDash([4,6]); ctx.lineWidth=2;\n    ctx.beginPath(); ctx.arc(cx,cy,44,0,TAU); ctx.stroke(); ctx.setLineDash([]);\n\n    ctx.fillStyle = '#caa15a';\n    ctx.fillRect(cx-26, cy-30, 52, 60);\n    ctx.strokeStyle = '#3fe0c8'; ctx.lineWidth=3; ctx.strokeRect(cx-26, cy-30, 52, 60);\n\n    const aim = Math.atan2(this.mouse.y-cy, this.mouse.x-cx);\n    ctx.strokeStyle = 'rgba(63,224,200,0.5)'; ctx.lineWidth=2;\n    ctx.beginPath(); ctx.moveTo(cx+Math.cos(aim)*46, cy+Math.sin(aim)*46); ctx.lineTo(cx+Math.cos(aim)*80, cy+Math.sin(aim)*80); ctx.stroke();\n\n    ctx.fillStyle = '#ff5470';\n    for (const inv of this.invaders) {\n      ctx.save(); ctx.translate(inv.x,inv.y); ctx.rotate(Math.atan2(cy-inv.y,cx-inv.x)+Math.PI/2);\n      ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(7,8); ctx.lineTo(-7,8); ctx.closePath(); ctx.fill();\n      ctx.restore();\n    }\n  }\n\n  // ---------- demo AI ----------\n  updateDemoAI(dt) {\n    if (this.stage === 1) {\n      let target = null, best = 1e9;\n      for (const r of this.raiders) { const d = Math.hypot(r.x-this.payload.x, r.y-this.payload.y); if (d<best){best=d;target=r;} }\n      if (target) { this.mouse.x = target.x; this.mouse.y = target.y; }\n      else { this.mouse.x = this.payload.x + 60; this.mouse.y = this.payload.y - 20; }\n      this.demoFire1 = (this.demoFire1||0) - dt;\n      if (this.demoFire1 <= 0 && this.raiders.length) { this.firePulse(); this.sfxPulse(); this.demoFire1 = 0.5; }\n    } else if (this.stage === 3) {\n      const cx=this.W/2, cy=this.H/2;\n      this.mouse.x = cx + Math.cos(this.targetAngle)*140;\n      this.mouse.y = cy + Math.sin(this.targetAngle)*140;\n    } else if (this.stage === 4) {\n      let target = null, bestY = -1e9;\n      for (const b of this.blockers) { if (b.y > bestY) { bestY = b.y; target = b; } }\n      this.mouse.x = target ? target.x : this.vanguard.x;\n      this.mouse.y = this.vanguard.y;\n      this.demoFire4 = (this.demoFire4||0) - dt;\n      if (this.demoFire4 <= 0 && this.blockers.length) { this.firePulse(); this.sfxPulse(); this.demoFire4 = 0.35; }\n    } else if (this.stage === 5) {\n      const cx=this.W/2, cy=this.H/2;\n      let target = null, best = 1e9;\n      for (const inv of this.invaders) { const d = Math.hypot(inv.x-cx, inv.y-cy); if (d<best){best=d;target=inv;} }\n      if (target) { this.mouse.x = target.x; this.mouse.y = target.y; }\n      else { this.mouse.x = cx+150; this.mouse.y = cy; }\n      this.demoFire5 = (this.demoFire5||0) - dt;\n      if (this.demoFire5 <= 0 && this.invaders.length) { this.firePulse(); this.sfxPulse(); this.demoFire5 = 0.3; }\n    }\n  }\n\n  // ---------- main loop ----------\n  loop(ts) {\n    const dt = Math.min(0.05, (ts - this.lastTs)/1000);\n    this.lastTs = ts;\n    const ctx = this.ctx;\n    if (ctx) {\n      this.drawGrid(ctx);\n      const phase = this.state.phase;\n      if (phase === 'playing') {\n        if (this.demoMode) this.updateDemoAI(dt);\n        if (this.stage === 1) { this.updateStage1(dt); this.drawStage1(ctx); }\n        if (this.stage === 3) { this.updateStage3(dt); this.drawStage3(ctx); }\n        if (this.stage === 4) { this.updateStage4(dt); this.drawStage4(ctx); }\n        if (this.stage === 5) { this.updateStage5(dt); this.drawStage5(ctx); }\n        this.drawPulses(ctx);\n      } else if (phase === 'stage2') {\n        this.updateStage2(dt);\n      }\n      this.updateParticles(dt);\n      this.drawParticles(ctx);\n    }\n    this.raf = requestAnimationFrame((t)=>this.loop(t));\n  }\n\n  renderVals() {\n    const s = this.state;\n    const meta = STAGES[Math.min(s.stage,5)-1] || STAGES[0];\n    const meterLabels = { 3: 'ALIGNMENT LOCK', 4: 'ROAD CLEARED', 5: 'CIVILIZATIONAL COMPOUNDING' };\n    const stageContexts = {\n      1: 'Priests smuggle Sri Ranganatha out of Srirangam ahead of the Sultanate\\'s riders.',\n      2: 'Captured and forcibly converted in Delhi, the two brothers now serve as the Sultanate\\'s regional administrators — authority borrowed, not owned.',\n      3: 'Swami Vidyāraṇya, at the Tungabhadra, aligns the new capital to a compass no hand turns.',\n      4: 'General Gopana\\'s vanguard clears occupied garrisons on the road back to Srirangam.',\n      5: 'The deity is reinstalled; hold the gate while the restoration compounds.',\n    };\n    const hasMeter = s.phase==='playing' && (s.stage===3 || s.stage===4 || s.stage===5);\n\n    const stage2Options = [\n      { key:'1', label:'IDENTITY OVERWRITE' },\n      { key:'2', label:'NEW NAME' },\n      { key:'3', label:'PROXY COMMAND' },\n    ].map(o => {\n      const active = o.key === this.stage2Key;\n      return {\n        ...o,\n        onPress: () => this.stage2Press(o.key),\n        borderColor: active ? '#ff5470' : 'rgba(255,255,255,0.15)',\n        textColor: active ? '#ff5470' : '#8fa19f',\n        bg: active ? 'rgba(255,84,112,0.08)' : 'transparent',\n      };\n    });\n\n    return {\n      setCanvasRef: (el)=>this.setCanvasRef(el),\n      onPointerMove: (e)=>this.onPointerMove(e),\n      onPointerDown: (e)=>this.onPointerDown(e),\n      onBegin: ()=>this.onBegin(),\n      onWatchDemo: ()=>this.onWatchDemo(),\n      onContinue: ()=>this.onContinue(),\n      onRestart: ()=>this.onRestart(),\n      onRestartOrExit: ()=> s.demoMode ? this.onExitDemo() : this.onRestart(),\n      isDemoMode: !!s.demoMode,\n      restartLabel: s.demoMode ? 'EXIT DEMO' : 'RESTART',\n\n      isTitle: s.phase === 'title',\n      isHowTo: s.phase === 'howto',\n      onShowHowTo: ()=>this.onShowHowTo(),\n      onBackFromHowTo: ()=>this.onBackFromHowTo(),\n      howToStages: [\n        { num:1, name:'THE SECRET EXILE', place:'Srirangam, 1323 CE', steps:[\n          'The bronze payload moves automatically along a winding path. Move your mouse/finger to aim your protective arc around it.',\n          'Crimson raiders approach from the edges — if one hits while inside your arc, it dissolves; if it hits outside your arc, you take damage.',\n          'Click/tap to fire an expanding pulse that dissolves any raider it touches.',\n          'Win by escorting the payload safely across the screen.' ] },\n        { num:2, name:'THE OPERATING SYSTEM RESET', place:'Delhi, 1327–1335 CE', steps:[\n          'A command flashes: IDENTITY OVERWRITE, NEW NAME, or PROXY COMMAND. Press the matching key (1/2/3) or click the glowing box.',\n          'Respond too fast (mashing) and it reads as panic — Identity Core drops. Too slow, and it reads as refusal.',\n          'Find the paced rhythm and survive 45 seconds without the Identity Core hitting 0%.' ] },\n        { num:3, name:'THE GRANITE RIDGE TRANSMISSION', place:'Tungabhadra Bank, 1336 CE', steps:[\n          'Sage Vidyaranya sits at the center, emitting a rotating compass beam.',\n          'Move your mouse/finger around the center to point your own line at the same angle as the beam.',\n          'Stay aligned (line turns teal) to accumulate 20 seconds of lock — drifting obstacles will try to obscure your view.' ] },\n        { num:4, name:'THE SOUTHERN CAMPAIGN', place:'The Liberation Route, 1371 CE', steps:[\n          'Your vanguard auto-advances up the battlefield; move your mouse/finger left-right to steer it. The payload follows behind.',\n          'Click/tap to fire a shockwave that clears crimson blockers ahead.',\n          'Clear all 3 waves of blockers to reach Srirangam.' ] },\n        { num:5, name:'THE TRIUMPHANT RETURN', place:'Reinstallation, 1371–1372 CE', steps:[\n          'The temple gate sits fixed at the center. Invaders stream in from all directions.',\n          'Aim with your mouse/finger and click/tap to fire a directional pulse toward them.',\n          'Keep the gate standing until the Civilizational Compounding meter reaches 100%.' ] },\n      ],\n      isInterlude: s.phase === 'interlude',\n      isPlaying: s.phase === 'playing',\n      isStage2: s.phase === 'stage2',\n      isGameOver: s.phase === 'gameover',\n      isVictory: s.phase === 'victory',\n      showHud: s.phase === 'playing' || s.phase === 'stage2',\n\n      stage: s.stage,\n      stageLabel: `STAGE ${s.stage} / 5`,\n      stageName: meta.name,\n      stageContext: stageContexts[s.stage] || '',\n\n      sanctityPct: s.sanctity,\n      sanctityInt: Math.round(s.sanctity),\n      sanctityColor: s.sanctity > 40 ? '#3fe0c8' : '#ff5470',\n\n      hasMeter,\n      meterLabel: meterLabels[s.stage] || '',\n      meterPct: s.meter,\n      meterInt: Math.round(s.phase==='stage2' ? s.identityCore : s.meter),\n\n      logText: s.logText,\n\n      interludeTitle: meta.name,\n      interludePlace: meta.place,\n      interludeBody: s.stage === 1 ? meta.intro : (STAGES[s.stage-2].outro + '\\n\\n' + meta.intro),\n      interludeBtnLabel: s.stage === 5 ? 'HOLD THE GATE' : 'CONTINUE',\n\n      stage2Prompt: s.stage2Prompt,\n      stage2Options,\n      stage2TimeLeft: s.stage2TimeLeft,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
