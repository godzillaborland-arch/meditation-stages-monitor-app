  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7af2146a-87da-4758-b37d-e7261a8c53f1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ea9f8654-0080-47fb-a3ee-00a4e5eaf51e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    html, body { margin: 0; padding: 0; background: #0e1013; }\n    a { color: #3fe0c8; } a:hover { color: #8ff0e2; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: #0e1013; font-family: 'Source Serif 4', Georgia, serif; color: #cfd6d4; padding: 60px 20px 90px 20px; display: flex; justify-content: center;\">\n  <div style=\"max-width: 680px; width: 100%; display: flex; flex-direction: column; gap: 14px;\">\n\n    <div style=\"text-align: center; margin-bottom: 36px; display: flex; flex-direction: column; gap: 10px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; color: #7a857f;\">The complete conversation<\u002Fdiv>\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: clamp(28px, 6vw, 42px); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #e8eeec; text-shadow: 0 0 24px rgba(63,224,200,0.3);\">Building Monkey Mind!<\u002Fdiv>\n      <div style=\"font-size: 14px; font-style: italic; color: #7a857f;\">An author and Claude, making a game for The Self-Driving Mind — unedited user messages, condensed replies.<\u002Fdiv>\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #3fe0c8; margin-top: 4px;\"><a href=\"https://godzillaborland-arch.github.io/meditation-stages-monitor-app/Dhyana_Game.html\">▶ Play the game<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-for list=\"{{ messages }}\" as=\"m\" hint-placeholder-count=\"6\">\n      <div style=\"display: flex; flex-direction: column;\">\n        <sc-if value=\"{{ m.isAuthor }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"align-self: flex-end; max-width: 88%; background: rgba(63,224,200,0.08); border: 1px solid rgba(63,224,200,0.28); padding: 13px 17px; font-size: 14.5px; line-height: 1.65; white-space: pre-wrap;\">{{ m.text }}<div style=\"font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #59635d; margin-top: 8px;\">Author<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ m.isClaude }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"align-self: flex-start; max-width: 88%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 13px 17px; font-size: 14.5px; line-height: 1.65; white-space: pre-wrap;\">{{ m.text }}<div style=\"font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #59635d; margin-top: 8px;\">Claude<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ m.isMark }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"align-self: center; display: flex; align-items: center; gap: 12px; width: 100%; margin: 18px 0;\">\n            <div style=\"flex: 1; height: 1px; background: rgba(63,224,200,0.18);\"><\u002Fdiv>\n            <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: #3fe0c8; white-space: nowrap;\">{{ m.text }}<\u002Fdiv>\n            <div style=\"flex: 1; height: 1px; background: rgba(63,224,200,0.18);\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <div style=\"text-align: center; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 28px; display: flex; flex-direction: column; gap: 10px;\">\n      <div style=\"font-size: 15px; font-style: italic; color: #97a29b;\">The center was never lost, and it is always there.<\u002Fdiv>\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: #59635d;\">From The Self-Driving Mind · Built with Claude<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const A = (text) => ({ isAuthor: true, isClaude: false, isMark: false, text });\n    const C = (text) => ({ isAuthor: false, isClaude: true, isMark: false, text });\n    const M = (text) => ({ isAuthor: false, isClaude: false, isMark: true, text });\n    return {\n      messages: [\n        M('Day 1 — The spark'),\n        A('Can you create a game like this for my book? The game in the video, Cubehead, is a top-down, minimalist 2D survival game… Given the central themes of my book, this format is an excellent fit. Instead of a \"zombie swarm,\" the incoming objects are sensory distractions, thoughts, or \"noise\" trying to break into the inner calm. The Center = the Core Self (Atman). The Perimeter = the boundary of awareness. The Pulse = the active calibration of attention.'),\n        C('This maps beautifully. I built it in one pass: a fixed center player (the Self), a breathing awareness ring, distraction-cubes spawning from all edges, a click/space \"pulse of awareness,\" a Concentration bar that drains on contact and heals in stillness, waves, and menu/game-over screens — dark slate, neon cyan, monospace HUD.'),\n        M('The thoughts get names'),\n        A('Beautiful. Should we name the distractions some names — they are thoughts correct?? Can you suggest.'),\n        C('Yes — labels make the metaphor land instantly. I proposed three vocabularies: everyday mind-chatter (worry, scroll, to-do…), Vedantic terms (chinta, raga, bhaya, ahamkara…), and Tesla driving metaphors (lane drift, road noise, blind spot).'),\n        A('#1 remove craving, rest ok. #2: chinta (worry), kalpana (imagination), raga (craving), dvesha (aversion), bhaya (fear), ahamkara (ego). #3 lane drift and road noise and blind spot. Any sound?'),\n        C('Done — every cube now carries its thought; the faster crimson cubes carry the Sanskrit afflictions. And sound arrived: a soft meditative drone, a whoosh per pulse, a blip when a thought dissolves, a low thud when one breaks through. All synthesized in code — no audio files.'),\n        M('Documentation'),\n        A('Fabulous. Any instructions sheet or is it self explanatory?'),\n        C('Self-explanatory — but I offered a printable companion sheet mapping every mechanic to the book: center = Atman, ring = awareness, cubes = vrittis, pulse = returning attention.'),\n        A('Yes. I like the 3 types of distractions — Vedanta etc'),\n        C('Built the companion sheet: the metaphor mapped, the three distraction types as cards, controls, and a closing line — \"Press Begin again. That, precisely, is the practice.\" Exported as PDF and editable PowerPoint.'),\n        M('One noticing at a time'),\n        A('In mobile, space removes all distractions. Can we do it one at a time.'),\n        C('The truest change of all — a real mind does not clear in one sweep. Each pulse now dissolves only the nearest thought, with a faster cooldown to stay fair.'),\n        A('Yes, this is tougher!'),\n        A('One tweak please make it steady rather than turbulent — or can it be a user option? Also optimize for mobile.'),\n        C('Difficulty became a player choice on the menu — CALM, STEADY, or TURBULENT mind-weather. And the game learned to live on a phone: tap to pulse, drag to face, everything scaling to small screens.'),\n        M('Into the world'),\n        A('Meta data please for WhatsApp, X etc, FB'),\n        C('Added Open Graph and Twitter cards plus a 1200×630 preview image. We hunted down a stubborn WhatsApp preview bug together — the tags were being buried too deep in the file for crawlers to see — and fixed it. The game went live on GitHub Pages.'),\n        A('Please change title of the book to The Self-Driving Mind in the PPTX. Can you make the 3 levels: CALM etc stand out please'),\n        C('Retitled, and the three levels became bold color-coded cards: green CALM (a gentle first sit), amber STEADY (the ordinary pace of an ordinary mind), crimson TURBULENT (a stormy mind).'),\n        M('The Gita enters'),\n        A('Can we say it the way the Gita does? Chapter 6, verse 26: \"yato yato niścalati manaś cañcalam asthiram — tatas tato niyamyaitad ātmany eva vaśaṁ nayet.\" Wherever the restless, unsteady mind wanders, from there bring it back, again and again, under the sway of the Self. And: the center was never lost — it is always there.'),\n        C('Updated the book page. I asked whether the game-over screen should match — it says \"the center was lost.\"'),\n        A('Leave those there. In a game you did lose'),\n        C('Exactly right. In the game you lose; in the teaching you never could. The distinction stays.'),\n        M('Monkey Mind!'),\n        A('Can we give it a better name? Something that would make Balvihar kids want to play.'),\n        C('Offered names: Sthira, Ekagrata, Guard the Lamp (Gita 6.19 — \"like a lamp in a windless place\"), Still the Storm, and Monkey Mind!'),\n        A('Monkey mind!! Or Bandarlok'),\n        C('Renamed: the title screen now reads BANDARLOK / MONKEY MIND! / Can you hold the center? — \"Your mind is full of monkeys, thoughts jumping in from every direction. Calm them, one at a time — and return, again and again, to the center.\"'),\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
